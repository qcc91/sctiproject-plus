version: 2

models:
  - name: fct_payment
    description: "Payment fact table at payment-level grain."
    columns:
      - name: payment_id
        tests:
          - not_null
          - unique

      - name: policy_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_policy')
                field: policy_id

      - name: payment_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['paid', 'refunded', 'failed', 'pending']

      - name: payment_amount
        tests:
          - not_null

      - name: currency
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['NZD', 'AUD']