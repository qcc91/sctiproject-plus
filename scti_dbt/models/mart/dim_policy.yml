version: 2

models:
  - name: dim_policy
    description: "Policy dimension for BI reporting."
    columns:
      - name: policy_id
        tests:
          - not_null
          - unique

      - name: customer_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_id

      - name: policy_number
        tests:
          - not_null
          - unique

      - name: policy_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['active', 'cancelled', 'expired', 'pending']

      - name: coverage_days
        tests:
          - not_null

      - name: currency
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['NZD', 'AUD']