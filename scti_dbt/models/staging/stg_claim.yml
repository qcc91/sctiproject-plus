version: 2

models:
  - name: stg_claim
    description: "Cleaned claim data from RAW.claim."
    columns:
      - name: claim_id
        tests:
          - not_null
          - unique

      - name: policy_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_policy')
              field: policy_id

      - name: claim_number
        tests:
          - not_null
          - unique

      - name: claim_status
        tests:
          - not_null
          - accepted_values:
              values: ['approved', 'pending', 'rejected', 'under review']

      - name: claim_type
        tests:
          - accepted_values:
              values: ['medical', 'baggage', 'cancellation', 'rental vehicle', 'travel delay']

      - name: claim_amount
        tests:
          - not_null

      - name: load_timestamp
        tests:
          - not_null