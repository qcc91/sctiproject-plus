version: 2

models:
  - name: stg_policy
    description: "Cleaned policy data from RAW.policy."
    columns:
      - name: policy_id
        tests:
          - not_null
          - unique

      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_customer')
              field: customer_id

      - name: policy_number
        tests:
          - not_null
          - unique

      - name: policy_status
        tests:
          - not_null
          - accepted_values:
              values: ['active', 'cancelled', 'expired', 'pending']

      - name: premium_amount
        tests:
          - not_null

      - name: currency
        tests:
          - accepted_values:
              values: ['NZD', 'AUD']

      - name: load_timestamp
        tests:
          - not_null