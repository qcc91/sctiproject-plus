version: 2

models:
  - name: int_claim
    description: "Claim-level intermediate model with derived claim attributes."
    columns:
      - name: claim_id
        tests:
          - not_null
          - unique

      - name: policy_id
        tests:
          - not_null
          - relationships:
              to: ref('int_policy')
              field: policy_id

      - name: claim_number
        tests:
          - not_null
          - unique

      - name: claim_status
        tests:
          - not_null
          - accepted_values:
              values: ['approved', 'pending', 'rejected', 'under review']

      - name: claim_type
        tests:
          - not_null
          - accepted_values:
              values: ['medical', 'baggage', 'cancellation', 'rental vehicle', 'travel delay']

      - name: claim_amount
        tests:
          - not_null

      - name: approval_ratio
        tests:
          - dbt_utils.expression_is_true:
              expression: "between 0 and 1"

      - name: load_timestamp
        tests:
          - not_null