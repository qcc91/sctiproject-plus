name: Airflow CI

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "scti_airflow/**"
      - ".github/workflows/airflow_ci.yml"
      - "pyproject.toml"
      - "uv.lock"

  pull_request:
    branches:
      - main
    paths:
      - "scti_airflow/**"
      - ".github/workflows/airflow_ci.yml"
      - "pyproject.toml"
      - "uv.lock"

jobs:
  airflow-check:
    name: Airflow Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Sync Dependencies
        run: uv sync --locked

      - name: Check DAG Python Syntax
        run: |
          uv run python -m compileall scti_airflow/dags